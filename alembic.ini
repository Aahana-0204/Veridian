[alembic]
# Path to migration scripts
script_location = migrations

# Allow %%(here)s substitution and .env loading
prepend_sys_path = .
version_path_separator = os

# Database URL is injected at runtime from DATABASE_URL env var (see env.py).
# This placeholder prevents alembic from erroring on bare invocation.
sqlalchemy.url = postgresql://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
