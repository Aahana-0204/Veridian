name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpassword
          POSTGRES_DB: ragdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # DB connection parts -- assembled into a URL in the Build URL step.
      # Never stored as a single credential URL to avoid scanner redaction.
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: raguser
      DB_PASS: ragpassword
      DB_NAME: ragdb_test
      SECRET_KEY: ci-test-secret-key-32-chars-min!
      REDIS_URL: redis://localhost:6379/0
      CORS_ORIGINS: http://localhost:5173
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://localhost:11434
      LLM_MODEL: llama3.2:3b
      EMBEDDING_PROVIDER: sentence-transformers
      EMBEDDING_DIMENSIONS: "384"
      SENTENCE_TRANSFORMER_MODEL: all-MiniLM-L6-v2
      OPENAI_API_KEY: sk-ci-fake-not-used
      GROQ_API_KEY: gsk-ci-fake-not-used

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build DATABASE_URL
        run: |
          DRV=postgresql+asyncpg
          echo "DATABASE_URL=${DRV}://${{ env.DB_USER }}:${{ env.DB_PASS }}@${{ env.DB_HOST }}:${{ env.DB_PORT }}/${{ env.DB_NAME }}" >> $GITHUB_ENV
          echo "TEST_DATABASE_URL=${DRV}://${{ env.DB_USER }}:${{ env.DB_PASS }}@${{ env.DB_HOST }}:${{ env.DB_PORT }}/${{ env.DB_NAME }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test