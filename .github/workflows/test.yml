name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpassword
          POSTGRES_DB: ragdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Both vars point to the test DB — DATABASE_URL satisfies Settings validation
      DATABASE_URL: postgresql+asyncpg://raguser:ragpassword@localhost:5432/ragdb_test
      TEST_DATABASE_URL: postgresql+asyncpg://raguser:ragpassword@localhost:5432/ragdb_test
      SECRET_KEY: ci-test-secret-key-not-used-in-tests
      CORS_ORIGINS: http://localhost:5173

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
